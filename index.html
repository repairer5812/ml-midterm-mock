<!DOCTYPE html>
<html lang="ko" data-theme="bento">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="인공지능융합학과 61기 최경찬">
<meta name="description" content="기계학습 중간고사 대비 모의고사 · Week 2~7 · 150문제 · 5세트 · 랭킹">
<meta property="og:title" content="기계학습 중간고사 모의고사">
<meta property="og:description" content="Week 2~7 전범위 · 150문제 · 5세트 · 즉시/일괄 채점 · 실시간 랭킹">
<meta property="og:type" content="website">
<meta name="theme-color" content="#234E70">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<title>기계학습 중간고사 모의고사</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme-bento.css">
<link rel="stylesheet" href="css/theme-dark.css">
</head>
<body>
<div class="page">

<header class="app-header">
  <div class="brand">
    <div class="brand-title">기계학습 모의고사</div>
    <div class="brand-sub">Week 2~7 · 150문제</div>
  </div>
  <div class="header-actions">
    <button id="theme-toggle" class="btn-icon" aria-label="테마 전환" onclick="window.__theme.toggleTheme()">☾</button>
  </div>
</header>

<main class="container">

  <section class="hero">
    <div class="hero-badge">MIDTERM PREP · 2026</div>
    <h1 class="hero-title">중간고사 모의고사</h1>
    <p class="hero-sub">5세트 × 30문제 · Week 2부터 Week 7까지 전범위</p>
  </section>

  <section>
    <div class="mode-selector" role="tablist" aria-label="풀이 모드 선택">
      <button class="mode-btn" data-mode="instant" role="tab">1문제씩 즉시 채점</button>
      <button class="mode-btn active" data-mode="batch" role="tab">30문제 일괄 채점</button>
    </div>
  </section>

  <section class="set-grid" id="set-grid">
    <!-- JS로 렌더링됨 -->
  </section>

  <section style="display:flex; gap:12px; justify-content:center; margin:40px 0 24px; flex-wrap:wrap;">
    <a class="btn btn-secondary btn-lg" href="result.html?view=ranking">🏆 전체 랭킹</a>
    <a class="btn btn-secondary btn-lg" href="exam.html?mode=wrong&all=1&review=1">📒 오답노트 (전 세트)</a>
  </section>

  <section style="margin-top:56px; padding:24px; border-top:1px dashed var(--c-border-soft); text-align:center;">
    <div class="muted small">
      인공지능융합학과 61기 최경찬 · <a href="mailto:repairer5812@gmail.com" style="color:inherit;text-decoration:underline;">repairer5812@gmail.com</a><br>
      학습 목적 비영리 프로젝트 · 문제는 강의 노트·슬라이드 기반으로 작성된 복습용 연습 문제입니다
    </div>
  </section>

</main>

</div>

<script type="module" src="js/theme.js"></script>
<script type="module">
  import { getBest } from "./js/storage.js";

  const SETS = [
    { id: 1, title: "SET 1", label: "기본 구성", desc: "전범위 균형" },
    { id: 2, title: "SET 2", label: "계산 중심", desc: "Week 7 비중↑" },
    { id: 3, title: "SET 3", label: "개념 중심", desc: "용어 구별" },
    { id: 4, title: "SET 4", label: "비교 유형", desc: "모델 대비" },
    { id: 5, title: "SET 5", label: "종합 심화", desc: "난이도 상" },
  ];

  // 모드 토글
  let mode = localStorage.getItem("ml-exam:mode") || "batch";
  const modeBtns = document.querySelectorAll(".mode-btn");
  modeBtns.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === mode);
    btn.addEventListener("click", () => {
      mode = btn.dataset.mode;
      localStorage.setItem("ml-exam:mode", mode);
      modeBtns.forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
      renderSets();
    });
  });

  function formatTime(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function renderSets() {
    const grid = document.getElementById("set-grid");
    grid.innerHTML = SETS.map(s => {
      const best = getBest(s.id);
      const bestHtml = best
        ? `<span class="set-best">${best.score}점</span><span class="muted small">${formatTime(best.durationSec)}</span>`
        : `<span class="set-best unplayed">미응시</span>`;
      return `
        <a class="set-card" href="exam.html?set=${s.id}&mode=${mode}" aria-label="${s.title} 시작">
          <div class="set-num">${s.label.toUpperCase()}</div>
          <div class="set-title">${s.title}</div>
          <div class="muted small">${s.desc}</div>
          <div class="set-meta">${bestHtml}</div>
        </a>`;
    }).join("");
  }

  renderSets();
</script>

</body>
</html>
